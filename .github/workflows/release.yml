name: 🚀 Publish Release

#Optimized for immutable releases: https://docs.github.com/en/code-security/concepts/supply-chain-security/immutable-releases

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'USE ONLY ON PUBLISH FAILURE AFTER FIXING PROBLEM. Release tag to re-publish (e.g. v1.2.3)'
        required: true
env:
  TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}

defaults:
  run:
    shell: pwsh

jobs:
  publish_chocolatey:
    name: 🍫 Chocolatey
    environment:
      name: Chocolatey
      url: https://community.chocolatey.org/packages/pingometer
    runs-on: windows-2025
    steps:
      - name: 📤 Checkout
        uses: actions/checkout@v6
      - name: 🚚 Push to Chocolatey
        env:
          GH_TOKEN: ${{ github.token }} # For GH CLI
        run: |
          $tagName = $env:TAG
          $version = $tagName.TrimStart('v')
          Write-Host "Push to Chocolatey with Release tag: $tagName, Version: $version"

          choco apikey -k ${{ secrets.CHOCOLATEY_API_KEY }} --source https://push.chocolatey.org/

          $msiAsset = gh release view $tagName --json assets
          | ConvertFrom-Json
          | Foreach-Object assets
          | Where-Object { $_.name -like "PingoMeter-*-x86.msi" }

          if (!$msiAsset) {
            Write-Error "Pingometer x86 msi asset not found for release $tagName. Does the release exist?"
            exit 1
          }

          $msiAssetUri = $msiAsset.url
          $msiHash = $msiAsset.digest -replace '^sha256:', ''
          "Found MSI asset URI: $msiAssetUri"

          $nuspecPath = "Installer/Chocolatey/PingoMeter/pingometer.nuspec"
          $installScriptPath = "Installer/Chocolatey/PingoMeter/tools/chocolateyinstall.ps1"

          (Get-Content $nuspecPath) -replace '__VERSION__', $VERSION | Set-Content $nuspecPath
          (Get-Content $installScriptPath) -replace '__VERSION__', $VERSION | Set-Content $installScriptPath
          "Version set to $VERSION in nuspec file and install script."

          (Get-Content $installScriptPath) -replace '__CHECKSUM__', $msiHash | Set-Content $installScriptPath
          "Checksum set to $msiHash in install script."

          Push-Location "Installer/Chocolatey/PingoMeter"
          "Current dir: $pwd"
          Get-Childitem $pwd
          "Starting Pack"
          & choco pack
          & choco push --source https://push.chocolatey.org/
          Pop-Location

  publish_winget:
    name: 🪟 WinGet
    environment:
      name: Winget
      url: https://github.com/microsoft/winget-pkgs/tree/master/manifests/j/JustinGrote/PingoMeter
    runs-on: windows-2025
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: 📤 Checkout
        uses: actions/checkout@v6
      - name: 🚚 Push to Winget
        env:
          GH_TOKEN: ${{ github.token }} # For GH CLI
          WINGET_CREATE_GITHUB_TOKEN: ${{ github.token }} # For WingetCreate
          WINGET_PACKAGE_NAME: "JustinGrote.PingoMeter"
        run: |
          $tagName = $env:TAG
          $version = $tagName.TrimStart('v')
          Write-Host "Push to Winget with Release tag: $tagName, Version: $version"

          $msiAssets = gh release view $tagName --json assets
          | ConvertFrom-Json
          | Foreach-Object assets
          | Where-Object { $_.name -like "PingoMeter-*.msi" }

          if ($msiAssets.Count -ne 2) {
            Write-Error "Expected exactly 2 MSI assets (x86 and arm64) for release $tagName, but found: $($msiAssets.url)"
            exit 1
          }

          $msiAssetUri = $msiAssets.url -join ','
          "Found MSI asset URI: $msiAssetUri"

          #Fetch WinGetCreate
          "Fetching latest wingetcreate"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          "Publishing to Winget version $version with MSI asset URI: $msiAssetUri"
          .\wingetcreate.exe update $env:WINGET_PACKAGE_NAME --version $version --urls $msiAssetUri --submit